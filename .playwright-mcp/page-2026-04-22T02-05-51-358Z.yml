      - generic [ref=e201]:
        - generic [ref=e202]:
          - heading "Webメッセージ" [level=1] [ref=e203]
          - paragraph [ref=e204]: WebメッセージはWebサイトを閲覧中の特定のユーザーに対し、適切なタイミングで画像やボタンのついたカスタマイズ可能なメッセージをポップアップで表示できる機能です。管理画面でメッセージを登録するだけで、既にリリースされたWebサイトにメッセージを配信することができます。そのため、マーケターだけでコンバージョンを上げるためのキャンペーンを配信することができます。
          - paragraph [ref=e205]:
            - link "web banner sample" [ref=e206] [cursor=pointer]:
              - /url: ../../_images/web-message-sample1.jpg
              - img "web banner sample" [ref=e207]
            - link "web dialog1 sample" [ref=e208] [cursor=pointer]:
              - /url: ../../_images/web-message-sample2.jpg
              - img "web dialog1 sample" [ref=e209]
            - link "web dialog2 sample" [ref=e210] [cursor=pointer]:
              - /url: ../../_images/web-message-sample3.jpg
              - img "web dialog2 sample" [ref=e211]
          - paragraph [ref=e212]: 以下の設定をカスタマイズすることで、エンドユーザーの行動に即した効果的なマーケティング施策を実行することができます。
          - list [ref=e213]:
            - listitem [ref=e214]:
              - paragraph [ref=e215]: 画像
            - listitem [ref=e216]:
              - paragraph [ref=e217]: Webサイト上のLPを開くためのURLや、Webメッセージからアプリを起動し、アプリ内の任意の画面に遷移するためのディープリンクを埋め込めるボタン（1-4個設定可能）
            - listitem [ref=e218]:
              - paragraph [ref=e219]: スケジュール
            - listitem [ref=e220]:
              - paragraph [ref=e221]: 配信対象となるユーザー
            - listitem [ref=e222]:
              - paragraph [ref=e223]: メッセージ表示タイミング
          - paragraph [ref=e224]: "例えば:"
          - list [ref=e225]:
            - listitem [ref=e226]:
              - paragraph [ref=e227]: カートに商品を入れたあと購入に至らなかったユーザーに対しクーポンを配信する
            - listitem [ref=e228]:
              - paragraph [ref=e229]: コンバージョンをあげるために、数日前に登録したユーザーに適切なナビゲーションを表示する
          - paragraph [ref=e230]: また、作成されたWebメッセージはキャンペーン毎に1ユーザーに対して1回、もしくは複数回メッセージを表示することができます。表示回数については、配信設定で設定できます。なお、Webメッセージは画面上に表示されたタイミングで既読したとみなし、各種計測結果に反映されます。
          - generic [ref=e231]:
            - heading "Webメッセージを作成する" [level=2] [ref=e232]
            - paragraph [ref=e233]: 管理画面を開いて以下を実行してください。
            - paragraph [ref=e234]:
              - strong [ref=e235]: マーケティング > メッセージ
              - text: に行き、 新規作成ボタンから
              - strong [ref=e236]: Webメッセージ
              - text: をクリックしてください。
            - img "Create web message" [ref=e237]
            - generic [ref=e238]:
              - paragraph [ref=e239]: "警告:"
              - generic [ref=e240]:
                - generic [ref=e241]:
                  - text: サイトのソースコード上でmeta要素 での
                  - code [ref=e242]: viewport
                  - text: の 設定次第で、いずれのメッセージテンプレートにおいても意図通りに表示されない可能性があります。
                - generic [ref=e243]:
                  - text: 意図通りに表示されない場合は、
                  - code [ref=e244]: viewport
                  - text: の設定もの変更もしくは、カスタムメッセージをご利用いただきWeb メッセージの設定を変更していただく必要があります。
                - generic [ref=e245]: ご不明点がございましたら、チャットサポートまでご連絡ください。
            - generic [ref=e246]:
              - heading "メッセージテンプレートの選択" [level=3] [ref=e247]
              - paragraph [ref=e248]:
                - text: テンプレート選択画面からどのタイプのメッセージを作るかを決めます。メッセージのタイプは
                - strong [ref=e249]: ダイアログ
                - text: 、
                - strong [ref=e250]: 固定バー
                - text: 、
                - strong [ref=e251]: 吹き出し
                - text: 、
                - strong [ref=e252]: 埋め込み
                - text: 、
                - strong [ref=e253]: その他
                - text: の5タイプがあり、ボタンやテキスト、画像の有無別にテンプレートが用意されています。使用するテンプレートの画像をクリックすると、メッセージの編集画面へと遷移します。
              - list [ref=e254]:
                - listitem [ref=e255]:
                  - paragraph [ref=e256]: "テキスト : メッセージに見出しと本文が含まれます"
                - listitem [ref=e257]:
                  - paragraph [ref=e258]: "画像 : メッセージに画像を添付できます"
                - listitem [ref=e259]:
                  - paragraph [ref=e260]: "ボタン : 任意のテキストのボタンを設置できます。ボタンのクリックイベントはその他のイベント同様、トラックすることができます。"
              - img "select web message template" [ref=e261]
            - generic [ref=e262]:
              - heading "キャンペーン設定" [level=3] [ref=e263]
              - paragraph [ref=e264]: メッセージの効果を測るため、キャンペーン名とコンバージョンゴールを設定します。
              - img "web message Campaign" [ref=e265]
              - generic [ref=e266]:
                - heading "キャンペーン名" [level=4] [ref=e267]
                - paragraph [ref=e268]: キャンペーン名を設定します。メッセージの一覧に表示されます。
              - generic [ref=e269]:
                - heading "コンバージョンイベントを指定" [level=4] [ref=e270]
                - paragraph [ref=e271]:
                  - text: キャンペーンのゴールとなるイベントを最大2つまで指定できます。Webメッセージが表示されてから24時間以内にこれらのイベントを実施したユーザーの数が集計されます。詳細は
                  - link "こちら" [ref=e272] [cursor=pointer]:
                    - /url: "#web-message-measurement"
                  - text: をご覧ください。詳細は
                  - link "ニュースフィード" [ref=e273] [cursor=pointer]:
                    - /url: newsfeed.html
                  - text: をご覧ください。
                - generic [ref=e274]:
                  - heading "キャンペーンをニュースフィードとして利用するかを指定" [level=5] [ref=e275]
                  - paragraph [ref=e276]: 上記の画像にある「通知をニュースフィードとして使う」のチェックボックスを使い、キャンペーンをニュースフィードとして利用するかを指定します。
                  - paragraph [ref=e277]:
                    - text: ニュースフィードとは、
                    - strong [ref=e278]: ユーザーごとのキャンペーンの配信履歴
                    - text: のことです。この履歴を利用することで、今までに送ったキャンペーンの履歴をアプリ内のお知らせ欄で表示するといったことが可能です。
                  - paragraph [ref=e279]:
                    - text: ご利用に際しては、ニュースフィードAPIを使用して取得可能です。詳細は
                    - link "開発ガイド" [ref=e280] [cursor=pointer]:
                      - /url: ../../dev/newsfeed-api/index.html
                    - text: をご覧ください。
                  - paragraph [ref=e281]:
                    - text: またWeb SDKに加えて、Native SDKもご利用されている場合は、SDKを使用しても取得が可能です。この場合、アプリ側で実装が必要になります。詳細は
                    - link "開発ガイド" [ref=e282] [cursor=pointer]:
                      - /url: ../../dev/sdk/newsfeed.html
                    - text: をご覧ください。
                  - generic [ref=e283]:
                    - paragraph [ref=e284]: "警告:"
                    - paragraph [ref=e285]: アプリ内メッセージおよびWebメッセージをニュースフィードとして利用する際には、仕様上下記のようなユースケースでは意図した挙動とならないことがございますのでご注意ください。
                    - paragraph [ref=e286]: 例) 購入イベントをトリガーにして、作成されたキャンペーンをニュースフィードとして利用する場合
                    - list [ref=e287]:
                      - listitem [ref=e288]:
                        - paragraph [ref=e289]: ニュースフィードはキャンペーンとは別に独立して作成されるため、キャンペーンが表示されていなくてもニュースフィードとしては取得が可能になります。
