          - generic [ref=e255]:
            - heading "セットアップ計測タグを導入する" [level=2] [ref=e256]
            - generic [ref=e257]:
              - generic [ref=e258]: セットアップ計測タグはサイト上のRepro Webを利用する上で必須の設定項目です。
              - generic [ref=e259]: 以下手順に沿って導入を進めてください。
            - generic [ref=e260]:
              - heading "セットアップ計測タグを準備する" [level=3] [ref=e261]
              - paragraph [ref=e262]: サイトに設置するセットアップ計測タグを準備します。
              - paragraph [ref=e263]: まず、導入サイトでユーザーIDを取得するか否かをご判断下さい。
              - generic [ref=e264]:
                - paragraph [ref=e265]: "注釈:"
                - paragraph [ref=e266]: ユーザーIDとは、Repro Webでユーザーを同定するための識別子です。 通常Repro Webはブラウザ(cookie)をベースにユーザーを同定しますが、異なるブラウザやプラットフォームを跨いでユーザを識別するためには、ユーザーIDにDB上の会員IDなど固有の識別子をセットする必要があります。
                - paragraph [ref=e267]: 例えば、以下のようなケースを実現するためにはユーザーIDの設定が必要です。
                - list [ref=e268]:
                  - listitem [ref=e269]:
                    - paragraph [ref=e270]: PC、スマホといったデバイスを跨いだ計測やセグメント施策を実施する場合
                  - listitem [ref=e271]:
                    - paragraph [ref=e272]: WebとAppなどプラットフォームを跨いだ計測やセグメント施策を実施する場合
                  - listitem [ref=e273]:
                    - paragraph [ref=e274]: 会員ID等をキーとしてDB、DMP等のサーバーデータとRepro Webを直接連携する場合
              - paragraph [ref=e275]: ECサイトなどログイン機能があるサイトではユーザーIDの設定を推奨します。 ユーザーIDを設定する場合、セットアップ計測タグに会員IDユーザ同定ができる値を動的に埋め込みます。 この作業は基礎的なプログラムの知識が必要ですので、サイト管理者様など、適切なご担当者様へ本マニュアルを連携し作業を進めてください。
              - paragraph [ref=e276]:
                - text: 以下、ユーザーIDを取得する場合は
                - code [ref=e277]: ユーザーID実装あり
                - text: のタグを利用し、ユーザーIDを取得しない場合は
                - code [ref=e278]: ユーザーID実装なし
                - text: のタグを利用してください。
              - paragraph [ref=e279]:
                - strong [ref=e280]: セットアップ計測タグ(ユーザーID実装あり)
              - generic [ref=e283]: "// SET_USER_ID の部分に貴社のユーザーIDが取得できる実装をしてください <script> !function(o,e,n){var r=[];if(window.reproio)console.info(\"Repro Web SDK was loaded more than once\");else{window.reproio=function(){r.push(arguments)};var i=o.createElement(e),t=o.getElementsByTagName(e)[0];i.src=\"https://cdn.reproio.com/web/v2/repro-sdk.min.js\",i.async=!0,i.crossOrigin=\"\",i.onload=function(){window.reproio(\"setSnippetVersion\",\"2.1\"),r.forEach(function(o){window.reproio.apply(window.reproio,o)})},t.parentNode.insertBefore(i,t)}}(document,\"script\"); reproio(\"setUserID\", \"SET_USER_ID\"); reproio(\"setup\", \"YOUR_REPRO_SDK_TOKEN\"); reproio(\"track\",\"PageView\"); </script>"
