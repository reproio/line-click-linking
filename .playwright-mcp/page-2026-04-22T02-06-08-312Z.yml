          - generic [ref=e213]:
            - heading "アカウントにログインする" [level=2] [ref=e214]
            - paragraph [ref=e215]: はじめにRepro Webの利用申し込みをするとご連絡いただいたメールアドレスへ招待メールが届きます。 メール内の「今すぐ確認」リンクから、Repro Webの管理画面へログインしてください。
            - paragraph [ref=e216]:
              - img "login_1.png" [ref=e217]
            - paragraph [ref=e218]: すでに企業内で他のメンバーの方がRepro Webを利用している場合は、 Repro Web管理者権限を持つメンバーの方に 左メニューの設定 > メンバー管理 からメールアドレスを登録し、 アカウントへ招待していただく事もできます。
          - generic [ref=e219]:
            - heading "導入方法を選択する" [level=2] [ref=e220]
            - paragraph [ref=e221]: Repro Webはタグマネージャーを使って導入することができます。
            - paragraph [ref=e222]: Repro WebではGoogle Tag Manager(GTM)とYahoo Tag Manager(YTM)の動作を確認していますが、 YTMは「タグの実行順序がコントロールできない」という問題があるため、 Google Tag Manager(GTM)での導入を推奨しています。
            - paragraph [ref=e223]: その他の計測タグマネージャーでも動作実績はございますが動作確認の上ご利用ください。
            - paragraph [ref=e224]: 本マニュアルではGoogle Tag Manager(GTM)を使った場合とウェブページに直接埋め込む場合の導入方法をご紹介します。
            - generic [ref=e225]:
              - link "Google Tag Manager(GTM)で導入する" [ref=e227] [cursor=pointer]:
                - /url: "#install-with-gtm"
              - link "Webページに直接タグを埋め込み導入する" [ref=e229] [cursor=pointer]:
                - /url: "#install-directly-on-web-pages"
            - paragraph [ref=e231]: また、以下の条件に該当する場合はサポート担当へお問合せ下さい。 適切な導入方法をご案内します。
            - list [ref=e232]:
              - listitem [ref=e233]:
                - paragraph [ref=e234]: 複数ドメインをまたいで計測する
              - listitem [ref=e235]:
                - paragraph [ref=e236]: ASPサービスやカートシステムを利用しているサイトへ導入する
