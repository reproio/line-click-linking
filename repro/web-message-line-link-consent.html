<!--
  Repro Webメッセージ - LINE ID連携許諾
  ==========================================
  【使い方】
  1. Repro管理画面 > マーケティング > メッセージ > 新規作成 > Webメッセージ
  2. テンプレート: 「カスタムメッセージ」を選択
  3. このファイルの内容を貼り付ける

  【配信トリガー設定】
  - イベント: line_id_link_consent
    (Repro Web設定で「URLに line_uid が含まれるときに発火」として設定)

  【LINEメッセージのURL形式】
  https://your-app.vercel.app/?line_uid=Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx&channel_id=1234567890
-->

<style>
  #repro-line-consent {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px 24px;
    max-width: 340px;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  #repro-line-consent .consent-logo {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  #repro-line-consent .consent-logo svg {
    width: 64px;
    height: 64px;
  }

  #repro-line-consent h2 {
    font-size: 18px;
    font-weight: 700;
    color: #111;
    margin: 0 0 10px;
    line-height: 1.4;
  }

  #repro-line-consent p {
    font-size: 13px;
    color: #555;
    line-height: 1.7;
    margin: 0 0 24px;
  }

  #repro-line-consent .consent-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #repro-line-consent .btn-confirm {
    background: #06C755;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }

  #repro-line-consent .btn-confirm:hover {
    background: #05b04b;
  }

  #repro-line-consent .btn-cancel {
    background: transparent;
    color: #888;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }

  #repro-line-consent .btn-cancel:hover {
    background: #f5f5f5;
  }

  #repro-line-consent .consent-note {
    font-size: 11px;
    color: #aaa;
    margin: 14px 0 0;
    line-height: 1.6;
  }
</style>

<div id="repro-line-consent">
  <!-- LINE ロゴ -->
  <div class="consent-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320"><defs><style>.cls-1{fill:#06c755;}.cls-2{fill:#fff;}</style></defs><g id="Layer_2" data-name="Layer 2"><g id="LINE_LOGO" data-name="LINE LOGO"><rect class="cls-1" width="320" height="320" rx="72.14"/><path class="cls-2" d="M266.66,144.92c0-47.74-47.86-86.58-106.69-86.58S53.28,97.18,53.28,144.92c0,42.8,38,78.65,89.22,85.42,3.48.75,8.21,2.29,9.4,5.26,1.08,2.7.71,6.93.35,9.65,0,0-1.25,7.53-1.52,9.13-.47,2.7-2.15,10.55,9.24,5.76s61.44-36.18,83.82-61.95h0C259.25,181.24,266.66,164,266.66,144.92Z"/><path class="cls-1" d="M231.16,172.49h-30a2,2,0,0,1-2-2v0h0V123.94h0v0a2,2,0,0,1,2-2h30a2,2,0,0,1,2,2v7.57a2,2,0,0,1-2,2H210.79v7.85h20.37a2,2,0,0,1,2,2V151a2,2,0,0,1-2,2H210.79v7.86h20.37a2,2,0,0,1,2,2v7.56A2,2,0,0,1,231.16,172.49Z"/><path class="cls-1" d="M120.29,172.49a2,2,0,0,0,2-2v-7.56a2,2,0,0,0-2-2H99.92v-37a2,2,0,0,0-2-2H90.32a2,2,0,0,0-2,2v46.53h0v0a2,2,0,0,0,2,2h30Z"/><rect class="cls-1" x="128.73" y="121.85" width="11.64" height="50.64" rx="2.04"/><path class="cls-1" d="M189.84,121.85h-7.56a2,2,0,0,0-2,2v27.66l-21.3-28.77a1.2,1.2,0,0,0-.17-.21v0l-.12-.12,0,0-.11-.09-.06,0-.11-.08-.06,0-.11-.06-.07,0-.11,0-.07,0-.12,0-.08,0-.12,0h-.08l-.11,0h-7.71a2,2,0,0,0-2,2v46.56a2,2,0,0,0,2,2h7.57a2,2,0,0,0,2-2V142.81l21.33,28.8a2,2,0,0,0,.52.52h0l.12.08.06,0,.1.05.1,0,.07,0,.14,0h0a2.42,2.42,0,0,0,.54.07h7.52a2,2,0,0,0,2-2V123.89A2,2,0,0,0,189.84,121.85Z"/></g></g></svg>
  </div>

  <h2>LINEアカウントと連携する</h2>
  <p>
    連携すると、LINEでサービスからの<br>
    お知らせをお届けできるようになります。
  </p>

  <div class="consent-actions">
    <button class="btn-confirm" id="repro-line-consent-btn">連携する</button>
    <button class="btn-cancel" id="repro-line-cancel-btn">後で</button>
  </div>

  <p class="consent-note">
    連携はいつでも解除できます。
  </p>
</div>

<script>
(function () {
  // ─────────────────────────────────────────────
  // 設定: 自社の LINE チャネル ID を入力してください
  // ─────────────────────────────────────────────
  var LINE_CHANNEL_ID = 'YOUR_LINE_CHANNEL_ID';

  // ─────────────────────────────────────────────
  // [フロー図 2] URLパラメーターから line_uid を取得し
  // localStorage にも保存（ページ遷移後もアクセス可能にする）
  // ─────────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var lineUid = params.get('line_uid');
  var channelId = params.get('channel_id') || LINE_CHANNEL_ID;

  if (lineUid) {
    localStorage.setItem('repro_line_uid', lineUid);
  }
  if (channelId) {
    localStorage.setItem('repro_channel_id', channelId);
  }

  // localStorage からも取得（URLパラメーターがない場合のフォールバック）
  lineUid = lineUid || localStorage.getItem('repro_line_uid');
  channelId = channelId || localStorage.getItem('repro_channel_id') || LINE_CHANNEL_ID;

  // ─────────────────────────────────────────────
  // 「連携する」ボタン: linkLineID を実行
  // ─────────────────────────────────────────────
  document.getElementById('repro-line-consent-btn').addEventListener('click', function () {
    if (!lineUid) {
      console.warn('[Repro] line_uid が見つかりません。URLに ?line_uid=Uxxxx を付与してください。');
      return;
    }

    if (typeof window.reproio !== 'function') {
      console.warn('[Repro] Repro Web SDK が読み込まれていません。');
      return;
    }

    // [フロー図 2] LINE ID を Repro に連携
    window.reproio('linkLineID', lineUid, channelId);

    // 連携後は localStorage をクリア
    localStorage.removeItem('repro_line_uid');
    localStorage.removeItem('repro_channel_id');

    // Webメッセージを閉じる（Repro SDK のクローズ処理）
    var el = document.getElementById('repro-line-consent');
    if (el) el.style.display = 'none';
  });

  // ─────────────────────────────────────────────
  // 「後で」ボタン: Webメッセージを閉じるだけ
  // ─────────────────────────────────────────────
  document.getElementById('repro-line-cancel-btn').addEventListener('click', function () {
    var el = document.getElementById('repro-line-consent');
    if (el) el.style.display = 'none';
  });
})();
</script>
